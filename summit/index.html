<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f0e8">
<meta name="robots" content="noindex, nofollow">
<title>Good Tech Summit</title>
<style>
  #gate{position:fixed;inset:0;z-index:9999;background:#f5f0e8;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;font-family:'DM Sans',sans-serif}
  #gate.hidden{display:none}
  #gate h2{font-family:'Instrument Serif',Georgia,serif;font-size:1.6rem;color:#2c2418}
  #gate input{padding:0.7rem 1rem;border:1px solid #e0d8c8;border-radius:10px;font-size:1rem;background:#fffdf8;color:#2c2418;width:240px;text-align:center;outline:none}
  #gate input:focus{border-color:#b85c38}
  #gate button{padding:0.6rem 1.5rem;border:none;border-radius:10px;background:#b85c38;color:#fffdf8;font-size:0.95rem;font-weight:600;cursor:pointer}
  #gate .err{color:#c0392b;font-size:0.85rem;min-height:1.2em}
</style>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#f5f0e8;
    --surface:#fffdf8;
    --surface-hover:#faf6ee;
    --border:#e0d8c8;
    --text:#2c2418;
    --text-secondary:#6b5d4d;
    --text-muted:#9c8e7c;
    --accent:#b85c38;
    --accent-dim:rgba(184,92,56,0.1);
    --red:#c0392b;--red-bg:rgba(192,57,43,0.08);--red-border:rgba(192,57,43,0.28);
    --orange:#d4731a;--orange-bg:rgba(212,115,26,0.08);--orange-border:rgba(212,115,26,0.28);
    --yellow:#a68b09;--yellow-bg:rgba(166,139,9,0.08);--yellow-border:rgba(166,139,9,0.28);
    --blue:#5a7d8f;--blue-bg:rgba(90,125,143,0.08);--blue-border:rgba(90,125,143,0.25);
    --green:#3d7a4a;--green-bg:rgba(61,122,74,0.07);--green-border:rgba(61,122,74,0.22);
    --purple:#7b5ea7;--purple-bg:rgba(123,94,167,0.07);--purple-border:rgba(123,94,167,0.22);
    --teal:#3d8b80;--teal-bg:rgba(61,139,128,0.07);--teal-border:rgba(61,139,128,0.22);
    --gray:#8a8078;--gray-bg:rgba(138,128,120,0.08);--gray-border:rgba(138,128,120,0.22);
    --opener-bg:rgba(184,92,56,0.06);
    --opener-border:rgba(184,92,56,0.3);
    --brief-bg:rgba(90,105,120,0.06);
    --brief-border:rgba(90,105,120,0.22);
    --brief-label:#5a6978;
    --pattern-color:#6b7b8a;
    --pattern-bg:rgba(107,123,138,0.07);
    --pattern-border:rgba(107,123,138,0.22);
  }
  html{font-size:16px;-webkit-text-size-adjust:100%}
  body{
    font-family:'DM Sans',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
    padding-bottom:2rem;
    background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  }

  /* Header */
  .header{
    position:sticky;top:0;z-index:100;
    background:linear-gradient(180deg,var(--bg) 0%,var(--bg) 92%,transparent 100%);
    padding:0.75rem 1rem 0;
    padding-top:max(0.75rem,env(safe-area-inset-top));
  }
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.35rem}
  .header-title{font-family:'Instrument Serif',Georgia,serif;font-size:1.5rem;font-weight:400;letter-spacing:-0.01em;color:var(--text)}
  .header-subtitle{font-size:0.75rem;color:var(--text-secondary);font-weight:500;margin-top:-0.1rem}
  .header-brand{font-size:0.65rem;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;opacity:0.85}
  .header-count{font-size:0.8rem;color:var(--text-muted);font-weight:500;text-align:right}

  /* Search */
  .search-wrap{position:relative;margin:0.5rem 0 0.4rem}
  .search-icon{position:absolute;left:0.75rem;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;width:18px;height:18px}
  .search-input{
    width:100%;padding:0.65rem 0.75rem 0.65rem 2.4rem;
    background:var(--surface);border:1px solid var(--border);
    border-radius:10px;color:var(--text);font-size:0.95rem;
    outline:none;transition:border-color 0.2s;-webkit-appearance:none;
  }
  .search-input::placeholder{color:var(--text-muted)}
  .search-input:focus{border-color:var(--accent)}
  .search-clear{
    position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);
    background:var(--border);border:none;color:var(--text-muted);
    width:22px;height:22px;border-radius:50%;
    font-size:0.75rem;cursor:pointer;display:none;
    align-items:center;justify-content:center;line-height:1;
  }
  .search-clear.visible{display:flex}

  /* Filter tabs */
  .filter-bar{display:flex;gap:0.35rem;overflow-x:auto;padding:0.25rem 0 0.6rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filter-bar::-webkit-scrollbar{display:none}
  .filter-btn{
    flex-shrink:0;padding:0.35rem 0.75rem;border-radius:8px;border:1px solid var(--border);
    background:var(--surface);color:var(--text-secondary);font-size:0.8rem;font-weight:500;
    cursor:pointer;transition:all 0.15s;white-space:nowrap;-webkit-tap-highlight-color:transparent;
  }
  .filter-btn.active{background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600}

  /* Card list */
  .card-list{padding:0 0.75rem;display:flex;flex-direction:column;gap:0.5rem}

  /* Card */
  .card{
    background:var(--surface);border:1px solid var(--border);border-radius:12px;
    overflow:hidden;transition:border-color 0.2s,background 0.2s,box-shadow 0.2s;
    -webkit-tap-highlight-color:transparent;
    box-shadow:0 1px 3px rgba(44,36,24,0.04);
  }
  .card.expanded{border-color:var(--accent);background:var(--surface-hover);box-shadow:0 2px 8px rgba(44,36,24,0.08)}

  .card-header{padding:0.85rem 0.9rem;display:flex;flex-direction:column;gap:0.25rem}
  .card-row1{display:flex;align-items:center;justify-content:space-between;gap:0.5rem}
  .card-name{
    font-family:'Instrument Serif',Georgia,serif;font-size:1.1rem;font-weight:400;letter-spacing:0;
    flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    cursor:pointer;-webkit-tap-highlight-color:transparent;
  }
  .card-name:active{opacity:0.7}
  .card-badges{display:flex;gap:0.3rem;flex-shrink:0}
  .badge{
    display:inline-flex;align-items:center;padding:0.15rem 0.5rem;border-radius:6px;
    font-size:0.65rem;font-weight:600;white-space:nowrap;letter-spacing:0.02em;
  }
  .badge-priority-vh{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
  .badge-priority-h{background:var(--orange-bg);color:var(--orange);border:1px solid var(--orange-border)}
  .badge-priority-m{background:var(--yellow-bg);color:var(--yellow);border:1px solid var(--yellow-border)}
  .badge-priority-l{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border)}
  .badge-eng-direct{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
  .badge-eng-channel{background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple-border)}
  .badge-eng-ecosystem{background:var(--teal-bg);color:var(--teal);border:1px solid var(--teal-border)}
  .badge-eng-relationship{background:var(--gray-bg);color:var(--gray);border:1px solid var(--gray-border)}

  .card-org{
    font-size:0.85rem;color:var(--accent);font-weight:600;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    cursor:pointer;text-decoration:underline;text-decoration-style:dotted;
    text-underline-offset:2px;text-decoration-color:rgba(184,92,56,0.4);
    -webkit-tap-highlight-color:transparent;
  }
  .card-org:active{opacity:0.7}
  .card-title{font-size:0.78rem;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

  /* Expanded body */
  .card-body{max-height:0;overflow:hidden;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1)}
  .card.expanded .card-body{max-height:4000px;transition:max-height 0.45s cubic-bezier(0.4,0,0.2,1)}
  .card-body-inner{padding:0 0.9rem 0.9rem;display:flex;flex-direction:column;gap:0.65rem}
  .card-divider{height:1px;background:var(--border);margin:0}

  /* Conversation opener */
  .opener-box{background:var(--opener-bg);border:1px solid var(--opener-border);border-radius:10px;padding:0.75rem 0.85rem}
  .opener-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--accent);font-weight:700;margin-bottom:0.3rem}
  .opener-text{font-size:0.92rem;line-height:1.55;color:var(--text);font-weight:450}

  /* Detail rows */
  .detail-section{display:flex;flex-direction:column;gap:0.15rem}
  .detail-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.07em;color:var(--text-muted);font-weight:600}
  .detail-value{font-size:0.85rem;color:var(--text-secondary);line-height:1.5}
  .detail-inline{display:flex;flex-wrap:wrap;gap:0.4rem 1rem}
  .detail-inline-item{display:flex;flex-direction:column}

  /* Tags */
  .tags{display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.15rem}
  .tag{padding:0.15rem 0.55rem;border-radius:6px;background:rgba(44,36,24,0.04);border:1px solid rgba(44,36,24,0.1);font-size:0.72rem;color:var(--text-secondary);font-weight:500}

  /* LinkedIn button */
  .linkedin-btn{
    display:inline-flex;align-items:center;gap:0.4rem;padding:0.45rem 0.85rem;border-radius:8px;
    background:rgba(10,102,194,0.08);border:1px solid rgba(10,102,194,0.2);
    color:#2267a2;font-size:0.8rem;font-weight:600;text-decoration:none;transition:background 0.15s;width:fit-content;
  }
  .linkedin-btn:active{background:rgba(10,102,194,0.15)}

  /* Notes */
  .notes-box{background:rgba(44,36,24,0.03);border:1px solid var(--border);border-radius:8px;padding:0.55rem 0.7rem;font-size:0.82rem;color:var(--text-muted);font-style:italic}

  /* Empty state */
  .empty-state{text-align:center;padding:3rem 1rem;color:var(--text-muted)}
  .empty-state-icon{font-size:2.5rem;margin-bottom:0.75rem;opacity:0.5}
  .empty-state-text{font-size:0.95rem}

  /* Research Modal */
  .modal-backdrop{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(44,36,24,0.5);z-index:200;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
  .modal-backdrop.visible{display:block}
  .modal-panel{
    position:fixed;bottom:0;left:0;right:0;max-height:85vh;
    background:var(--surface);border-radius:16px 16px 0 0;z-index:201;
    transform:translateY(100%);transition:transform 0.35s cubic-bezier(0.4,0,0.2,1);
    display:flex;flex-direction:column;box-shadow:0 -4px 24px rgba(44,36,24,0.15);
  }
  .modal-panel.visible{transform:translateY(0)}
  .modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:8px auto 0;flex-shrink:0}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.1rem 0.75rem;border-bottom:1px solid var(--border);flex-shrink:0}
  .modal-title{font-family:'Instrument Serif',Georgia,serif;font-size:1.15rem;font-weight:400;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:0.5rem}
  .modal-close{
    width:32px;height:32px;border:1px solid var(--border);border-radius:8px;
    background:var(--surface);color:var(--text-muted);font-size:1.1rem;
    cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent;
  }
  .modal-close:active{background:var(--surface-hover)}
  .modal-body{
    padding:1rem 1.1rem 2rem;overflow-y:auto;-webkit-overflow-scrolling:touch;
    font-size:0.88rem;line-height:1.65;color:var(--text-secondary);
  }
  .modal-body h3{font-family:'Instrument Serif',Georgia,serif;font-size:1.1rem;font-weight:400;color:var(--text);margin-bottom:0.75rem}
  .modal-body h4{font-size:0.8rem;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--accent);margin-top:1rem;margin-bottom:0.35rem}
  .modal-body p{margin-bottom:0.65rem}
  .modal-body ul{margin:0.35rem 0 0.65rem 1.2rem}
  .modal-body li{margin-bottom:0.3rem}
  .modal-body strong{color:var(--text)}
  .modal-no-research{text-align:center;padding:2rem 1rem;color:var(--text-muted);font-style:italic}

  /* AI Pattern badge */
  .badge-pattern{
    background:var(--pattern-bg);color:var(--pattern-color);border:1px solid var(--pattern-border);
    font-size:0.6rem;font-weight:600;letter-spacing:0.03em;
  }
  .card-pattern-row{display:flex;align-items:center;gap:0.35rem;margin-top:0.1rem}

  /* AI Pattern filter bar */
  .filter-bar-pattern{display:flex;gap:0.35rem;overflow-x:auto;padding:0 0 0.6rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .filter-bar-pattern::-webkit-scrollbar{display:none}

  /* Brief box */
  .brief-box{background:var(--brief-bg);border:1px solid var(--brief-border);border-radius:10px;padding:0.75rem 0.85rem}
  .brief-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--brief-label);font-weight:700;margin-bottom:0.3rem}
  .brief-text{font-size:0.88rem;line-height:1.55;color:var(--text);font-weight:400}

  /* Questions list */
  .questions-box{margin-top:0.15rem}
  .questions-label{font-size:0.65rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--brief-label);font-weight:700;margin-bottom:0.35rem}
  .questions-list{list-style:none;counter-reset:q;display:flex;flex-direction:column;gap:0.4rem;padding-left:0}
  .questions-list li{
    counter-increment:q;display:flex;gap:0.5rem;
    font-size:0.85rem;line-height:1.5;color:var(--text-secondary);
  }
  .questions-list li::before{
    content:counter(q);flex-shrink:0;
    width:1.4em;height:1.4em;border-radius:50%;
    background:rgba(107,123,138,0.1);color:var(--pattern-color);
    font-size:0.7rem;font-weight:700;
    display:flex;align-items:center;justify-content:center;margin-top:0.15rem;
  }

  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
</head>
<body>
<div id="gate"><h2>Good Tech Summit</h2><input id="gatePass" type="password" placeholder="Password" autofocus><button onclick="checkGate()">Enter</button><div class="err" id="gateErr"></div></div>
<script>
function checkGate(){var p=document.getElementById('gatePass').value;if(p==='raising-the-floor'){document.getElementById('gate').classList.add('hidden');sessionStorage.setItem('gts','1')}else{document.getElementById('gateErr').textContent='Incorrect password'}}
document.getElementById('gatePass').addEventListener('keydown',function(e){if(e.key==='Enter')checkGate()});
if(sessionStorage.getItem('gts')==='1')document.getElementById('gate').classList.add('hidden');
</script>
<div class="header" id="header">
  <div class="header-top">
    <div>
      <div class="header-title">Good Tech Summit</div>
      <div class="header-subtitle">April 6&ndash;8 &middot; The Westin DC</div>
    </div>
    <div style="text-align:right">
      <div class="header-brand"></div>
      <div class="header-count" id="counter">40 of 40 contacts</div>
    </div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" class="search-input" id="search" placeholder="Search name or organization..." autocomplete="off" autocapitalize="off" spellcheck="false">
    <button class="search-clear" id="clearBtn" aria-label="Clear search">&times;</button>
  </div>
  <div class="filter-bar" id="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="very-high">&#x1F534; Very High</button>
    <button class="filter-btn" data-filter="high">&#x1F7E0; High</button>
    <button class="filter-btn" data-filter="medium">&#x1F7E1; Medium</button>
    <button class="filter-btn" data-filter="lower">&#x1F535; Lower</button>
  </div>
  <div class="filter-bar-pattern" id="patternFilters">
    <button class="filter-btn active" data-pattern="all">All Patterns</button>
    <button class="filter-btn" data-pattern="Shipped AI Products">Shipped AI</button>
    <button class="filter-btn" data-pattern="Internal AI Operations">Internal AI</button>
    <button class="filter-btn" data-pattern="Ecosystem Builders">Ecosystem</button>
    <button class="filter-btn" data-pattern="AI Consultancy">Consultancy</button>
    <button class="filter-btn" data-pattern="Data-Rich, Pre-AI">Data-Rich</button>
    <button class="filter-btn" data-pattern="Governance &amp; Infrastructure">Governance</button>
    <button class="filter-btn" data-pattern="Relationship Building">Relationship</button>
  </div>
</div>

<div class="card-list" id="cardList"></div>
<div class="empty-state" id="emptyState" style="display:none">
  <div class="empty-state-icon">&#x1F50D;</div>
  <div class="empty-state-text">No contacts match your search</div>
</div>

<!-- Research modal -->
<div class="modal-backdrop" id="modalBackdrop"></div>
<div class="modal-panel" id="modalPanel">
  <div class="modal-handle"></div>
  <div class="modal-header">
    <div class="modal-title" id="modalTitle"></div>
    <button class="modal-close" id="modalClose" aria-label="Close">&times;</button>
  </div>
  <div class="modal-body" id="modalBody"></div>
</div>
<script>

dless side of your work look like — is there overlap between the strategic design clients and the WIN community?"]},{"Name":"Johno Niles","Title / Role":"Executive Director","Organization":"Keeling Curve Foundation","Org Type":"Nonprofit / Foundation","Priority Tier":"🔵 Lower","AI Maturity":"Pre-AI","Annual Budget":"$262K","Headcount":"Volunteer-run","Top Claude Use Case":"Natural language interface for complex environmental datasets (CO2, ocean temp)","Existing AI Tools":"None documented","Existing Tech Partnerships":"Scripps/UCSD, NOAA, Data Foundation, EDF","Engagement Type":"Relationship Building","Conversation Opener":"Ask how you make decades of Earth observation data accessible to policymakers who aren't scientists","Org Description":"Ensures long-term Earth observations are supported and reach their highest social value. Named for the famous CO2 measurement.","Focus Areas":"Climate Data, Earth Observations, Science Communication","Location":"San Diego, CA","LinkedIn":"linkedin.com/in/johnoniles","Status":"","Notes":"","AI Pattern":"Data-Rich, Pre-AI","Brief":"Johno runs the Keeling Curve Foundation, named after the famous CO2 measurement curve (the longest continuous atmospheric CO2 record, started at Scripps/UCSD in 1958). The foundation ensures long-term Earth observations are funded and reach policymakers. They partner with Scripps/UCSD, NOAA, the Data Foundation, and EDF. It’s a tiny operation ($262K budget, all volunteers) sitting on decades of globally significant environmental datasets that could be transformative with the right AI interface.","Questions":["The Keeling Curve is one of the most important datasets in climate science — what does it actually take to keep a 60+ year observation record funded and running?","When you imagine making decades of atmospheric and ocean data accessible to policymakers who aren’t scientists, what would that interface look like?","You partner with Scripps, NOAA, and EDF — are any of them experimenting with AI to int ","The privacy-first, anti-extraction model is a strong stance — how does that shape your technology and funding choices?","What funders or partners are you talking to, and are any specifically interested in the AI-plus-clinical-safety angle?"]}];
const RESEARCH={"Ampersand (&KO)":"<h3>Ampersand (&amp;KO) &mdash; Data consultancy as channel partner</h3><p><strong>Website:</strong> ampersandko.com | <strong>Type:</strong> For-profit boutique consultancy</p><h4>Mission and scale</h4><p>Ampersand (&amp;KO) is Kyle Ogilvie&rsquo;s solo-practitioner data consultancy helping philanthropic foundations and nonprofits &ldquo;step into a world with less admin and more impact work.&rdquo; Based in San Francisco (DC at heart), Kyle brings a neuroscience research background, data science experience from 2U (edtech), and political fundraising analytics from Well &amp; Lighthouse. The firm is intentionally small &mdash; Kyle plus a network of named collaborators including Mary Ann Badavi, who specializes in <strong>machine learning, civic tech, and data visualization</strong>.</p><h4>AI and technology posture</h4><p>Kyle is further along on AI than his small footprint suggests. His GivingData partner profile explicitly lists <strong>AI as a service offering</strong> alongside reporting, data migration, APIs, and impact measurement. He also appears connected to <strong>e:cue AI</strong>, an AI-powered business intelligence platform launched in 2025. His GitHub repos show Python data engineering tools and PostgreSQL/d3.js visualization projects.</p><h4>Partnership ecosystem</h4><p>GivingData certified partner. Former DataKind DC volunteer. National Press Foundation Data Fellow. No documented relationships with Google.org, Microsoft, Salesforce, or major AI vendors &mdash; <strong>this is greenfield territory</strong>.</p><h4>Claude opportunity</h4><p>Ampersand is best understood as a <strong>multiplier/channel partner</strong>, not a single-org deployment. Kyle advises multiple foundations on data strategy and already positions AI as a service offering. The most promising use case is <strong>automated analysis of grant applications and unstructured program reports</strong>. AI maturity: <strong>early-to-active exploration</strong>.</p>","Aseel Technology":"<h3>Aseel Technology &mdash; Humanitarian tech platform with massive untapped data</h3><p><strong>Website:</strong> aseelapp.com | <strong>Type:</strong> For-profit tech startup + 501(c)(3) foundation</p><h4>Mission and scale</h4><p>Aseel connects underserved countries to the digital economy through an ethical e-commerce marketplace and humanitarian aid platform. Founded in 2017 by <strong>Nasrat Khalid</strong> (Afghan refugee, former World Bank technologist). Aseel has reached remarkable scale: <strong>642,500+ people helped, $5M in direct aid distributed, 5,500+ artisans onboarded</strong>, and <strong>75,000+ digital IDs (OMID IDs)</strong> issued across all 34 Afghan provinces. Operations span the USA, T&uuml;rkiye, and Afghanistan. Funding: <strong>$850K pre-seed</strong> raised in 2024, with plans for a $5&ndash;10M raise starting in 2026.</p><h4>Technology infrastructure</h4><p>Aseel runs <strong>Ferni</strong>, a proprietary backend capturing all data flows with analytics dashboards and open APIs. They built <strong>AidOS</strong> (&ldquo;Aid Operating System&rdquo;) &mdash; a new SaaS product for NGOs to manage aid delivery operations, with 25 NGOs including IFC/World Bank onboarding for pilots. The <strong>OMID ID system</strong> provides digital identities with QR codes, household surveys, and priority algorithms for aid allocation.</p><h4>AI gap and opportunity</h4><p>Despite all this tech infrastructure, <strong>no AI/ML implementations are documented anywhere</strong>. Yet the data assets are extraordinary: 75,000+ beneficiary profiles, 20,000+ product listings, donor behavior data, and multilingual content needs spanning Pashto, Dari, Arabic, Turkish, and English.</p><h4>Top Claude use cases</h4><p>(1) A <strong>multilingual beneficiary support and donor communication layer</strong> across five languages; (2) an <strong>intelligence layer for AidOS</strong> &mdash; auto-generating impact reports and enabling natural-language queries across the Ferni database. AI maturity: <strong>pre-AI but data-rich</strong>.</p>","Ashoka":"<h3>Ashoka AI Lab &mdash; 4,000 social entrepreneurs meet &ldquo;conscious tinkering&rdquo;</h3><p><strong>Website:</strong> ashoka.org | <strong>Type:</strong> 501(c)(3), EIN: 51-0255908</p><h4>Mission and scale</h4><p>Ashoka is one of the world&rsquo;s most influential social-sector organizations, founded in 1980 by Bill Drayton. Core activity: identifying, selecting, and supporting <strong>4,000+ Ashoka Fellows</strong> &mdash; leading social entrepreneurs across <strong>90+ countries</strong>. <strong>FY2024: $42.1M revenue, $48.9M expenses, $75.2M net assets, 200&ndash;300+ employees globally.</strong></p><h4>The AI Lab</h4><p>Established September 2023, co-led by Dani Matielo and Odin M&uuml;hlenbein (ex-McKinsey), the lab has built <strong>25 prototypes</strong> including a knowledge chatbot, collaborator-finder tool, board meeting transcript analyzer (built on ChatGPT-4 Turbo), and a roleplay tool. They use <strong>make.com</strong> for no-code automation and <strong>OpenAI tools</strong> (no Claude usage documented &mdash; greenfield opportunity). Dani published a WEF article on their &ldquo;conscious tinkering&rdquo; approach.</p><h4>Data assets</h4><p>The Fellows database &mdash; <strong>4,000+ detailed profiles across 90+ countries</strong> with rich qualitative data &mdash; is one of the most unique knowledge assets in the social sector. Add decades of Changemakers.com challenge applications, the &ldquo;Leads&rdquo; CRM pipeline, and global staff communications.</p><h4>Partnership ecosystem</h4><p><strong>Microsoft</strong> (Accelerator 2019), <strong>Salesforce</strong> (customer), <strong>WEF</strong> (deep collaboration), <strong>Tech To The Rescue</strong>.</p><h4>Top Claude use cases</h4><p>(1) <strong>Fellow Knowledge Network AI</strong> &mdash; synthesizing the 4,000-Fellow knowledge base; (2) <strong>Fundraising pipeline intelligence</strong> &mdash; drafting proposals, matching Fellows with funders. AI maturity: <strong>active exploration, early adoption</strong>. Already building with OpenAI, ideal partner to migrate toward Claude.</p>","AXM":"<h3>AXM &mdash; AI governance infrastructure for creative IP</h3><p><strong>Website:</strong> axm.global | <strong>Type:</strong> Early-stage for-profit startup (AXM Technologies Corp.)</p><h4>Mission and model</h4><p>AXM is building the world&rsquo;s first <strong>Digital Public Infrastructure (DPI) for Cultural IP</strong> &mdash; a protocol layer that makes authorship consent, attribution, licensing, and usage enforcement a built-in part of how AI systems operate. Founded in 2025 in Los Angeles, addressing 60+ pending copyright lawsuits.</p><h4>Team</h4><p>Co-founder <strong>Archie Davis (CEO)</strong> was EVP and Chief Creative Officer at Def Jam Recordings. CTO <strong>Jameson Parker</strong> previously built systems at <strong>Google, Adobe, and public-sector institutions</strong>. Andrew Farrior directs the <strong>Cultural IP Research Hub at Miles College</strong>, an HBCU with $3M NSF grant. AXM is <strong>Black-owned</strong>.</p><h4>Product capabilities</h4><p>Registration of creative works, AI consent governance, automated licensing workflows, royalty payout routing, and live dashboards. Completed a pilot with &ldquo;the largest global publisher.&rdquo;</p><h4>Ecosystem</h4><p>Creative Commons&rsquo; Open Culture Platform, <strong>UNIDO&rsquo;s AIM Global Platform</strong> (United Nations), <strong>Howard University School of Law AI Initiative</strong>, Northwestern Mutual Black Founder Accelerator.</p><h4>Claude partnership logic</h4><p>AXM isn&rsquo;t adopting AI &mdash; they&rsquo;re building governance infrastructure for AI. (1) <strong>Strategic alignment</strong> &mdash; Anthropic could integrate with AXM&rsquo;s consent protocols; (2) <strong>Product embedding</strong> &mdash; Claude could power automated content classification, rights parsing, and catalog processing at scale. AI maturity: <strong>AI-native (building for the AI ecosystem)</strong>.</p>","Benetech / Tech Matters":"<h3>Benetech / Tech Matters &mdash; The most AI-ready org on this list</h3><p><strong>Website:</strong> techmatters.org, bd4d.org | <strong>Type:</strong> Two separate 501(c)(3)s</p><h4>Mission and scale</h4><p>Jim Fruchterman is a MacArthur Fellow, Skoll Award recipient, and former rocket engineer who <strong>co-founded two for-profit AI/ML companies</strong> before pivoting to nonprofits. Benetech ($16.1M revenue, ~109 employees) runs <strong>Bookshare</strong>, the world&rsquo;s largest accessible ebook library (<strong>1.4M titles, 700,000+ users, 88+ countries, 49 languages</strong>). Tech Matters (29 staff across 9 countries) builds open-source tech-for-good products.</p><h4>Active AI projects</h4><ul><li><strong>Aselo AI:</strong> Open-source NLP algorithms for categorizing and summarizing crisis chat conversations across 15+ national child helplines in Brazil, Canada, India, Philippines, and 11 other countries.</li><li><strong>Bookshare+ AI chatbot:</strong> An AI-powered learning companion for students with disabilities.</li><li><strong>&ldquo;Nonprofit AI Treasure Map&rdquo;</strong> (published 2024): A practical decision-making framework.</li><li><strong>The Better Deal for Data (BD4D)</strong> launched v1.0 January 28, 2026 &mdash; a lightweight data governance standard for nonprofits.</li></ul><h4>Partnership ecosystem</h4><p><strong>Google.org</strong> (on Tech Matters&rsquo; board), <strong>Twilio.org</strong> (major Aselo funder), <strong>Facebook/Meta</strong>, <strong>AWS</strong>, <strong>Schmidt Futures</strong>, <strong>Skoll Foundation</strong>, <strong>Patrick J. McGovern Foundation</strong>, <strong>Okta for Good</strong>.</p><h4>Top Claude use cases</h4><p>(1) <strong>Aselo crisis conversation AI</strong> &mdash; Claude&rsquo;s multilingual NLP and safety features are tailor-made for sensitive child protection conversations. Could become a flagship Anthropic deployment story. (2) <strong>BD4D adoption assistant</strong> &mdash; helping nonprofits assess data practices and generate governance playbooks. AI maturity: <strong>active adoption / sophisticated</strong>. The single most technically ready and mission-aligned organization.</p>","Women In Innovation / Boundless":"<h3>Women In Innovation (WIN) / Boundless Studio &mdash; Strategic design connector</h3><p><strong>Type:</strong> WIN: 501(c)(3) nonprofit | Boundless: For-profit BIPOC women-owned design consultancy</p><h4>Mission and scale</h4><p>Boundless is May Shek&rsquo;s boutique strategic design consultancy for mission-driven organizations. She also serves as <strong>Global Growth Strategy Lead at Women In Innovation (WIN)</strong>, a 21,000-member community for women innovators across NYC, SF, and London. WIN operates on a budget <strong>under $200K</strong> with 85+ volunteers.</p><h4>No AI activity documented</h4><p>Boundless is a human-centered design research practice. No AI use cases, strategy, or tools appear in any public materials. The real opportunity is as a <strong>user research collaborator</strong> for trauma-informed, community-driven design research when Anthropic designs Claude deployments for vulnerable populations.</p><h4>Ecosystem value</h4><p>May&rsquo;s network spans federal agencies (NASA, Departments of Education and Labor), major foundations (Schmidt Futures), and corporate innovation teams. WIN&rsquo;s board includes members from JPMorgan Chase, Visa, Mastercard, and is sponsored by <strong>Ernst &amp; Young</strong>.</p><h4>WIN AI opportunity</h4><p>With 21,000+ members and growing globally, <strong>AI-powered community matching</strong>, event recommendations, and member networking could dramatically improve the experience. Content automation (podcast transcription, newsletter personalization, event recaps) could help this sub-$200K organization punch far above its weight. AI maturity: <strong>Pre-adoption</strong>.</p>","Center on Rural Innovation (CORI)":"<h3>CORI &mdash; $7M AI strategy already in motion</h3><p><strong>Website:</strong> ruralinnovation.us | <strong>Type:</strong> 501(c)(3), EIN: 82-4508477</p><h4>Mission and scale</h4><p>CORI is a national nonprofit building inclusive, tech-enabled economies in rural America. Founded by <strong>Matt Dunne</strong> (who started Google&rsquo;s Community Affairs division). Works with <strong>43 communities across 26 states representing 2.9M+ people</strong>. <strong>FY2024: $4.87M revenue, $5.71M expenses.</strong></p><h4>AI is CORI&rsquo;s central strategic pillar</h4><p>In September 2025, CORI announced a comprehensive AI expansion with <strong>$7M raised</strong> across three tracks: equipping community leaders with AI tools, providing founders with AI frameworks, and building AI-native workforce training. Their <strong>AI Advisory Board</strong> features executives from <strong>Google DeepMind</strong>, <strong>SandboxAQ</strong>, <strong>Inflection AI</strong>, and stealth AI startups.</p><h4>Data infrastructure</h4><p>Public <strong>Data API</strong> serving broadband data, ISP data, census block GeoJSON, and BEAD county summaries. Multiple open-source repos for broadband mapping and rural economic development tools.</p><h4>Partnership ecosystem</h4><p><strong>Google</strong> (founder connection + sponsor), <strong>Microsoft</strong> ($7M AI funder), <strong>Siegel Family Endowment</strong>, <strong>Patrick J. McGovern Foundation</strong>, <strong>Cognizant</strong>, <strong>Nasdaq</strong>, <strong>LinkedIn</strong>, <strong>Meta</strong>.</p><h4>Top Claude use cases</h4><p>(1) <strong>AI-powered rural economic development assistant</strong> &mdash; synthesizing data to generate customized strategy recommendations; (2) <strong>AI-native workforce training and startup acceleration</strong>. AI maturity: <strong>active adoption, transitioning to sophisticated</strong>. CORI has the funding, advisory board, data infrastructure, and strategic will. They need concrete AI tools to execute.</p>","Centre for Public Impact (CPI)":"<h3>CPI &mdash; BCG-backed gatekeeper to $75M+ in AI grants</h3><p><strong>Website:</strong> centreforpublicimpact.org | <strong>Type:</strong> Not-for-profit, founded by BCG</p><h4>Mission and scale</h4><p>CPI is a global not-for-profit founded by <strong>BCG (Boston Consulting Group)</strong> that partners with public servants to reimagine government. <strong>FY2024 North America: $7.93M revenue, ~30&ndash;40 US staff. Globally ~60 staff.</strong> They&rsquo;ve worked with <strong>170+ governments</strong> and <strong>920+ public servants</strong> in North America.</p><h4>CPI&rsquo;s AI role: gatekeeper and program manager</h4><ul><li><strong>Google.org AI Opportunity Fund: Europe</strong> &mdash; delivery partner for &euro;15M initiative</li><li><strong>Google.org AI for Global Goals</strong> &mdash; co-designed $25M fund</li><li><strong>Google.org AI for Government Innovation (2026)</strong> &mdash; reviewer for $30M fund</li><li><strong>Google.org AI for Science (2026)</strong> &mdash; reviewer for another $30M fund</li></ul><p>CPI is involved in <strong>$75M+ in AI-for-government grants</strong> through Google.org alone, plus Bloomberg Philanthropies and Knight Foundation programs.</p><h4>Top Claude use cases</h4><p>(1) <strong>Government innovation toolkit</strong> &mdash; Claude powering an assistant that helps public servants apply CPI&rsquo;s frameworks; (2) <strong>Grant evaluation at scale</strong>. AI maturity: <strong>active facilitator, internally early</strong>. Strategic value is CPI&rsquo;s position as gatekeeper to massive AI funding and BCG/Google.org relationships.</p>","Dion's Chicago Dream / Cosmic Crate":"<h3>Cosmic Crate / Dion&rsquo;s Chicago Dream &mdash; Food-is-medicine tech with explosive growth</h3><p><strong>Website:</strong> dionschicagodream.com, cosmiccrate.app | <strong>Type:</strong> 501(c)(3)</p><h4>Mission and scale</h4><p>Dion&rsquo;s Chicago Dream (DCD) is a food-is-medicine nonprofit delivering fresh produce to food-insecure Chicago residents. Growth: from <strong>$53K in 2020 to $6.05M in FY2024</strong>, tripling revenue nearly every year. Serves <strong>1,600&ndash;2,000 families weekly</strong> across <strong>70+ neighborhoods and 160+ zip codes</strong> with <strong>200,000+ lbs of produce delivered</strong>. One-third of recipients show improved health outcomes.</p><h4>Cosmic Crate is the tech layer</h4><p>Built by Matt Strauss (who previously founded RiseKit, a $10M workforce tech platform). Provides last-mile operations, inventory, routing, and data in one system. Designed to be replicable for food pantries and last-mile delivery SMBs.</p><h4>No AI in production, but rich data</h4><p>2,000+ weekly deliveries, health outcomes tracking, inventory management. Food-is-medicine contracts surging (program service revenue jumped from 7% to <strong>38.5%</strong> of total revenue). <strong>No documented tech company partnerships</strong> &mdash; complete greenfield.</p><h4>Top Claude use cases</h4><p>(1) <strong>Delivery optimization and recipient communication</strong>; (2) <strong>Health outcomes analysis and grant reporting automation</strong>. AI maturity: <strong>very early exploration</strong>.</p>","data.org":"<h3>data.org &mdash; The field-defining platform where Claude could become the standard</h3><p><strong>Website:</strong> data.org | <strong>Type:</strong> 501(c)(3)</p><h4>Mission and scale</h4><p>data.org is the central node of the data-and-AI-for-social-impact ecosystem. Announced at Davos in 2020 by <strong>The Rockefeller Foundation and Mastercard</strong> with a <strong>$50M founding commitment</strong>. Goal: train <strong>1 million purpose-driven data practitioners by 2032</strong>. Team of ~20+ led by Chief Scientist <strong>Danil Mikhailov, Ph.D.</strong></p><h4>Key products</h4><ul><li><strong>Data Maturity Assessment (DMA):</strong> Free online tool for organizations to assess data/AI maturity</li><li><strong>Innovation Challenges:</strong> $10M Inclusive Growth Challenge, Generative AI Skills Challenge, Activate AI with Zoom ($115K+ per winner)</li><li><strong>Capacity Accelerator Network (CAN):</strong> Five global hubs, <strong>150,000+ people trained</strong></li><li><strong>Epiverse:</strong> Open-source public health data tools</li><li><strong>I-CAIR:</strong> Institute for Community AI Research</li></ul><h4>Partnership ecosystem</h4><p>Founding partners <strong>Mastercard</strong> and <strong>Rockefeller Foundation</strong>. Major partners: <strong>Zoom, Splunk, Microsoft AI for Good, AWS, OpenAI, DataKind</strong> ($20M), <strong>Harvard Data Science Initiative, World Bank, United Nations</strong>.</p><h4>Top Claude use cases</h4><p>(1) <strong>Embed Claude in the Data Maturity Assessment</strong> as an AI-powered advisory layer &mdash; positioning Claude as the recommended AI tool within the instrument thousands of nonprofits use; (2) <strong>AI backbone for Innovation Challenges</strong>. AI maturity: <strong>sophisticated / field-leader</strong>. data.org doesn&rsquo;t just use AI &mdash; they define how the entire social sector should.</p>","Delivery Associates":"<h3>Delivery Associates &mdash; Hiring AI staff who already know Claude</h3><p><strong>Type:</strong> For-profit global social impact consultancy, 200+ staff across 40 countries</p><h4>Core profile</h4><p>Founded by Sir Michael Barber (former head of UK PM&rsquo;s Delivery Unit under Tony Blair). Their Deliverology&reg; methodology helps governments bridge policy ambition and implementation. Works in <strong>70+ countries</strong> on six continents. Major clients: Bloomberg Philanthropies, Walton Family Foundation, Blue Meridian Partners, and numerous national governments.</p><h4>AI and technology lens</h4><p><strong>Delivery Associates is actively hiring an &ldquo;AI-Focused Delivery Leader&rdquo; whose job posting explicitly names Claude.</strong> The posting requires candidates to &ldquo;guide internal and external teams in using GenAI tools (e.g., ChatGPT, Claude, Gemini) to support problem-solving and delivery.&rdquo; They&rsquo;re building a Measurement, Evaluation and Digital Practice.</p><h4>Claude opportunity</h4><p><strong>Use case 1: AI-powered delivery intelligence.</strong> Claude could analyze implementation data from government projects, generating progress reports and identifying bottlenecks. <strong>Use case 2: Government AI readiness consulting.</strong> AI maturity: <strong>Early &rarr; Active adoption</strong>. They are hiring AI-specific staff who already know Claude. This is a warm lead.</p>","Empower Work":"<h3>Empower Work &mdash; AI roadmap with 350K+ tagged messages</h3><p><strong>Type:</strong> 501(c)(3) nonprofit, San Francisco</p><h4>Core profile</h4><p>Free, confidential text-based support for workers navigating workplace challenges (bullying, bias, harassment, job loss). Workers text 510-674-1414 and connect within ~2 minutes to a trained volunteer peer counselor. Founded 2018 by Jaime-Alexis Fowler. FY2024 revenue: <strong>$3.18 million</strong> (nearly tripling). Supported <strong>500K+ workers</strong>, goal of 3 million within five years. 70% of texters report feeling unsafe or disrespected at work.</p><h4>AI and technology lens</h4><p><strong>Empower Work has explicitly stated they are &ldquo;investing in an AI roadmap while remaining human-centered.&rdquo;</strong> Tech stack: Twilio (core messaging), PagerDuty (which states their support &ldquo;will help Empower Work leverage AI&rdquo;), custom eLearning platform. Data assets: <strong>11,000+ anonymized text conversations comprising 350,000+ messages, tagged for emotions, subject matter, and other factors</strong>.</p><h4>Claude opportunity</h4><p><strong>Use case 1: AI-augmented peer counselor support</strong> &mdash; real-time assistance during live conversations. <strong>Use case 2: Training simulator</strong> &mdash; Claude as the &ldquo;practice texter&rdquo; for volunteer training. AI maturity: <strong>Early exploration &rarr; Strategic planning</strong>. High intent, strong data foundation.</p>","Fenwick Nonprofit Strategies":"<h3>Fenwick Nonprofit Strategies &mdash; Solo consultant with evangelist potential</h3><p><strong>Type:</strong> For-profit solo consultancy, New York City</p><h4>Core profile</h4><p>Founded ~2022 by Jen Fenwick after a decade as Director of Institutional Giving at Science Friday (NPR). Helps nonprofits at the intersection of science, technology, and society with grants strategy, prospect research, proposal management. Clients: science centers/museums, media producers, foundations, journalism outlets. Revenue likely sub-$500K.</p><h4>AI lens</h4><p>Completed <strong>Cornell University&rsquo;s AI Strategy Certificate</strong>. No AI-specific services currently listed. Work is intensely text-heavy &mdash; grant proposals, LOIs, concept papers, logic models &mdash; all areas where LLMs excel.</p><h4>Claude opportunity</h4><p><strong>Use case 1: AI-powered grant writing assistant.</strong> <strong>Use case 2: Funder research and prospect intelligence.</strong> AI maturity: <strong>Early exploration (personal)</strong>. A potential evangelist who could influence her nonprofit client ecosystem.</p>","Impact Evolution Technologies":"<h3>Impact Evolution Technologies &mdash; Salesforce powerhouse for nonprofits</h3><p><strong>Type:</strong> For-profit, woman-owned LLC, Oakland, CA</p><h4>Core profile</h4><p>Nonprofit technology consulting specializing in Salesforce implementations. CEO Sara Chieco, MS in Computer Science. <strong>~10 named staff</strong>, <strong>400+ successful projects for 100+ nonprofit partners</strong>. Revenue estimated at $2-5M. Deepest expertise in <strong>accreditation</strong> (ACCJC, NECHE, COA, ACSWASC). Built <strong>34 Salesforce Experience Cloud portals</strong>.</p><h4>AI lens</h4><p>No explicit AI services listed, but strong engineering capability. Clients handle massive text through accreditation processes &mdash; self-study reports (often 100+ pages), peer reviewer evaluations, compliance documentation.</p><h4>Claude opportunity</h4><p><strong>Use case 1: AI-enhanced accreditation management.</strong> <strong>Use case 2: Development accelerator and client AI features</strong> (Apex code generation, smart search, natural language data queries). AI maturity: <strong>Pre-AI but technically ready</strong>. Potential <strong>channel partner</strong> &mdash; 100+ nonprofit clients could access Claude through their solutions.</p>","Indus Action / Independent":"<h3>Indus Action &mdash; India&rsquo;s civic-tech giant desperate for AI talent</h3><p><strong>Type:</strong> Indian nonprofit, headquartered in New Delhi</p><h4>Core profile</h4><p>One of India&rsquo;s largest civic-tech organizations, founded 2013 by Tarun Cherukuri (Harvard Kennedy School, Obama Foundation Fellow, Ashoka Fellow). <strong>50-100+ staff</strong> across <strong>14-18 Indian states</strong>. Reached <strong>2 million+ vulnerable families</strong>, enrolled <strong>392,622 students</strong> under Right to Education. Products: RTE Digital Public Good, Universal Benefits Interface (5,000+ anti-poverty schemes), POWER Portfolio.</p><h4>AI lens</h4><p>Builds digital platforms for state governments (lottery algorithms, school registration, student tracking). CEO stated in February 2025: <strong>&ldquo;The market is very competitive, and we can&rsquo;t play that game price-wise&hellip; if the likes of Google.org, OpenAI or other big tech firms could have a talent externship program&hellip; We could really unlock significant impact.&rdquo;</strong> Data assets: application data for millions of families, school registrations, student tracking across 14+ states. Need multilingual support across Hindi, English, Odia, Telugu, and other regional languages.</p><h4>Claude opportunity</h4><p><strong>Use case 1: Multilingual citizen helpline AI.</strong> <strong>Use case 2: Government scheme matching and document processing.</strong> AI maturity: <strong>Early exploration with high tech readiness</strong>. Severely constrained by engineering talent &mdash; an Anthropic partnership offering API access plus technical guidance could unlock outsized impact.</p>","Innovation Network":"<h3>Innovation Network &mdash; Equity-centered evaluation with AI curiosity</h3><p><strong>Type:</strong> Nonprofit evaluation and research firm, Washington, DC (est. 1992)</p><h4>Core profile</h4><p>Fiscally sponsored project of Community Initiatives. ~5 staff, all with advanced degrees. Budget: $500K&ndash;$2M. Pioneers in advocacy evaluation, creators of the PointK Logic Model Builder, publishers of &ldquo;State of Evaluation&rdquo; reports. Work is overwhelmingly qualitative &mdash; interviews, focus groups, sensemaking sessions, community-centered evaluation.</p><h4>AI lens</h4><p>No AI tools deployed but brings a <strong>strong equity and justice lens</strong>. From Slack: &ldquo;We&rsquo;re excited about AI, but only when it furthers equity and justice&hellip; We proudly come with a point of view about data and its use.&rdquo;</p><p><strong>Critical note:</strong> This organization will approach AI with healthy skepticism rooted in equity values. Framing must center on augmenting participatory processes, not automating evaluation.</p><h4>Claude opportunity</h4><p><strong>Use case 1: Equity-centered qualitative data analysis</strong> (thematic coding, pattern identification, synthesis). <strong>Use case 2: Accessible, multilingual report generation.</strong> AI maturity: <strong>Pre-AI, values-driven exploration</strong>. Could become a powerful case study and thought partner for ethical AI in the social sector.</p>","Justicia Lab":"<h3>Justicia Lab &mdash; Most AI-sophisticated organization in the group</h3><p><strong>Type:</strong> Program within Pro Bono Net Inc. (501(c)(3))</p><h4>Core profile</h4><p>Pro Bono Net&rsquo;s immigrant justice technology lab, originally founded 2007 as Immigration Advocates Network. FY2024 revenue: <strong>$5.56 million</strong>. Digital tools help <strong>500,000 people annually</strong>.</p><h4>Products</h4><ul><li><strong>Citizenshipworks:</strong> &ldquo;TurboTax for becoming a U.S. citizen&rdquo; (180,000+ users)</li><li><strong>Immi:</strong> Legal options identification tool</li><li><strong>&iexcl;Reclamo!:</strong> Wage theft platform ($1.5M+ in stolen wages recovered)</li><li><strong>Reclamo AI:</strong> Generative AI-powered multilingual digital assistant for workplace justice</li></ul><h4>AI leadership</h4><p>Launched <strong>JusticiaLab.AI</strong> in April 2024 &mdash; &ldquo;The World&rsquo;s First Non-Profit AI Lab for Immigrant Justice&rdquo; &mdash; with <strong>$500,000 from Google.org</strong> via the Gen AI Accelerator for nonprofits. Approach grounded in language justice, data sovereignty, and equitable design. Reclamo AI is their first deployed generative AI product (with NYLAG). Also received <strong>$1 million from Houston Endowment</strong>.</p><h4>Claude opportunity</h4><p><strong>Use case 1: Multilingual immigration form and legal information assistance.</strong> <strong>Use case 2: Expanding Reclamo AI across states.</strong> AI maturity: <strong>Active adoption &rarr; Sophisticated</strong>. Existing Google.org AI relationship means Anthropic would be complementary &mdash; Justicia Lab may want to diversify their AI tooling.</p>","Keeling Curve Foundation":"<h3>Keeling Curve Foundation &mdash; Small but prestigious climate data org</h3><p><strong>Type:</strong> Very young, very small 501(c)(3) (founded 2022)</p><h4>Core profile</h4><p>Founded by Ralph Keeling &mdash; son of Charles David Keeling, who began the famous continuous atmospheric CO&#8322; measurements at Mauna Loa in 1958. Based in San Diego. FY2024 revenue: <strong>$261,850</strong>. All officers serve without compensation &mdash; essentially a volunteer-led startup nonprofit. Programs: the Keeling Award (first award for sustained LTOs), LTO Insights publishing, advocacy for sustained environmental datasets, Climate Week NYC convenings.</p><h4>Connections to major science</h4><p>Scripps Institution of Oceanography, NOAA, Data Foundation, Environmental Defense Fund, Climate Data Collaborative. Johno Niles (new Executive Director) previously led Science and Conservation at the San Diego Natural History Museum, founded the Carbon Institute.</p><h4>Claude opportunity</h4><p><strong>Use case 1: Making Earth observation data accessible</strong> &mdash; natural language interfaces for complex environmental datasets. <strong>Use case 2: Science communication amplification</strong> &mdash; translating dense scientific findings into policy briefs and public communications. AI maturity: <strong>Pre-AI, very early stage</strong>. Best approach: donated API credits and hands-on support.</p>","Kirkor IT Solutions":"<h3>Kirkor IT Solutions &mdash; Already building AI grant management</h3><p><strong>Type:</strong> Small custom software development company, New Rochelle, NY</p><h4>Core profile</h4><p>Boutique firm of <strong>1-5 people</strong> led by President Roland Rogers. Founded 20+ years ago, ~$500K revenue. Services: custom web applications, website optimization, data solutions for nonprofit clients in environmental, arts, education, scientific, finance, and publishing sectors.</p><h4>AI lens</h4><p><strong>Kirkor has already entered the AI space</strong> with an <strong>AI-assisted grant management system for foundations and their Boards</strong> &mdash; managing grants, tracking grantees, and measuring impact. The grant management domain involves extensive text processing &mdash; applications, proposals, progress reports, compliance documents &mdash; all ideally suited for LLMs.</p><h4>Claude opportunity</h4><p><strong>Use case 1: Claude API integration into grant management system.</strong> Potential <strong>channel partner</strong> &mdash; Claude as the AI backbone for proposal review, compliance checking, impact measurement, and board report generation. <strong>Use case 2: Expanding AI features for nonprofit clients.</strong> AI maturity: <strong>Active adoption (early product)</strong>. Conversation hook: &ldquo;What AI is currently powering your grant management system, and have you evaluated Claude&rsquo;s API?&rdquo;</p>","Learning Equality":"<h3>Learning Equality &mdash; Already using Claude, reaching 13M+ learners offline</h3><p><strong>Type:</strong> 501(c)(3), La Jolla, CA</p><h4>Core profile</h4><p>Builds <strong>Kolibri &mdash; a free, open-source, offline-first learning platform</strong>. FY2024 revenue: <strong>$3.32 million</strong>. Reaches <strong>13M+ learners across 220+ countries and territories</strong> in refugee settlements, rural schools, prisons, community centers. Platform runs as local Python/Django server with content in <strong>173+ languages</strong>. GitHub: 1,000+ stars, 922 forks, 34,725 commits.</p><h4>AI sophistication</h4><p>Their GitHub repository contains <strong>AGENTS.md and CLAUDE.md files</strong> &mdash; indicating they already use Claude Code. Since 2019: GPT-4/LLMs for <strong>semi-automated curriculum alignment</strong>. Co-hosted a <strong>Kaggle ML competition</strong>. Kolibri Studio: <strong>AI-powered content recommendations</strong>. Explicitly working on <strong>offline AI tools</strong>: &ldquo;Building out integrations, datasets, and fine-tuning processes&rdquo; and &ldquo;optimizing AI models for low-cost hardware.&rdquo;</p><h4>Partnership ecosystem</h4><p><strong>Google.org</strong> ($10M+ since 2015), <strong>Vodafone Foundation</strong>, <strong>UNHCR</strong>, <strong>Hewlett Foundation</strong>, <strong>UNICEF Innovation</strong>, <strong>UN Women</strong>, <strong>World Bank</strong>, <strong>Fast Forward</strong>.</p><h4>Claude opportunity</h4><p><strong>Use case 1: Claude for curriculum alignment</strong> (direct GPT-4 replacement). <strong>Use case 2: Offline AI tutoring via model optimization</strong> &mdash; Claude&rsquo;s Haiku model for local hardware, serving <strong>2.6 billion+ people</strong> without internet. AI maturity: <strong>Active adoption &rarr; Sophisticated</strong>. Existing GPT-4 use = direct switching opportunity.</p>","Thresholds":"<h3>Thresholds &mdash; Pioneering AI governance in behavioral health</h3><p><strong>Type:</strong> Illinois&rsquo; largest community mental health provider (est. 1959)</p><h4>Core profile</h4><p>Serves <strong>13,000+ adults and youth annually</strong>. <strong>$120.6M FY2024 revenue, 1,000+ employees, nearly 100 locations</strong>. Core programs: 1,000+ supportive housing units, four CCBHCs, evidence-based employment services, integrated primary/behavioral healthcare, Chicago&rsquo;s only citywide homeless mental health outreach. Revenue grew from $49M (2011) to $121M (2024) &mdash; <strong>146% growth over 13 years</strong>.</p><h4>Tim Turner&rsquo;s AI governance framework</h4><p><strong>Tim Turner (VP, Insights &amp; Analytics)</strong> &mdash; MBA from Chicago Booth, BA from Harvard, former analytics leadership at Walgreens. He &ldquo;led development&rdquo; of an AI Strategy &amp; Governance Framework in 2025 and the organization is &ldquo;in the midst of executing&rdquo; it in 2026. Data environment: multiple EHR systems, Medicaid billing, HIPAA and 42 CFR Part 2 compliance, SAMHSA reporting, Williams Consent Decree monitoring, outcomes measurement across 33+ programs.</p><h4>Top Claude use cases</h4><p>(1) <strong>Clinical documentation and care coordination</strong> &mdash; clinical note generation, care plan summarization, cross-system information synthesis. (2) <strong>Regulatory reporting and compliance automation.</strong> AI maturity: <strong>Active adoption &mdash; executing a formal AI governance framework</strong>. Among the most sophisticated AI strategy postures of any behavioral health nonprofit.</p>","UITCC":"<h3>UITCC &mdash; Coalition reshaping unemployment insurance technology</h3><p><strong>Type:</strong> Coalition / fiscally sponsored project of Digital Harbor Foundation</p><h4>Core profile</h4><p>Co-founded December 2020 by <strong>Marcus Courtney</strong> and Adam Bobrow. Coalition of <strong>25+ organizations</strong> including civic tech firms (Nava PBC, Bloom Works, U.S. Digital Response), labor unions (CWA, AFSCME, SEIU), legal aid organizations, think tanks, and privacy advocates (EPIC).</p><h4>The UI technology crisis</h4><p><strong>At least 12 U.S. states still run COBOL-based mainframe systems</strong> (some 50+ years old). Only ~27% of unemployed workers received benefits post-pandemic. GAO estimated <strong>$100-135 billion in pandemic UI fraud</strong>. Federal government committed $2 billion in ARPA funds for UI modernization.</p><h4>Marcus Courtney&rsquo;s background</h4><p><strong>Founded WashTech/CWA in 1998 &mdash; the first union for tech workers in the United States</strong> &mdash; while a contract worker at Microsoft. Later led the global telecom/tech sector at UNI Global Union (2.5M+ workers, 120 countries).</p><h4>Top Claude use cases</h4><p>(1) <strong>Plain-language transformation and multilingual access</strong> for UI notices and forms. (2) <strong>Knowledge synthesis across 53 state systems.</strong> AI maturity: <strong>Policy-informed exploration</strong>. Frame as augmenting (never replacing) human adjudicators. Marcus will be receptive if the framing is worker-centered and equity-focused.</p>","Vanguard Charitable":"<h3>Vanguard Charitable &mdash; A $22 billion philanthropy engine investing in AI</h3><p><strong>Website:</strong> vanguardcharitable.org | <strong>Type:</strong> 501(c)(3)</p><h4>Core profile</h4><p><strong>Third-largest donor-advised fund sponsor</strong> in the U.S., managing <strong>$22.17 billion in total assets</strong>. Distributed <strong>$3.9 billion in grants in 2025</strong> (ninth consecutive record year, 27% increase). Serves ~67,000 nonprofits. <strong>121 employees</strong>. FY2024: <strong>$6.41 billion total revenue</strong>.</p><h4>Vicky Kelberer&rsquo;s AI transformation</h4><p><strong>Vicky Kelberer (Head of Digital Experience, Operations, and AI Strategy)</strong> &mdash; 7+ years at Vanguard Charitable. Fulbright Specialist, co-founded Urban Refuge. Led Tableau implementation (cutting manual reporting by 50%). Tech stack: <strong>Salesforce Financial Services Cloud</strong>, <strong>Boomi</strong>, <strong>Tableau</strong>, <strong>PayPal Grant Payments</strong> ($1B+ distributed electronically), <strong>UiPath</strong> for RPA, <strong>Candid/GuideStar</strong> APIs.</p><h4>Top Claude use cases</h4><p>(1) <strong>Personalized grant recommendations and donor intelligence</strong> &mdash; 25+ years of grantmaking data across 67,000+ nonprofits, transforming the donor portal from transactional to advisory. (2) <strong>Operational automation and due diligence</strong> &mdash; with $3.9B flowing through the system, AI-powered grant processing and charity vetting. AI maturity: <strong>Active adoption &mdash; dedicated AI strategy leadership with budget authority and enterprise infrastructure</strong>. This is a <strong>high-value enterprise prospect</strong>.</p>","Watch Duty":"<h3>Watch Duty &mdash; From 3 counties to 16.8 million users in four years</h3><p><strong>Website:</strong> watchduty.org | <strong>Type:</strong> Nonprofit</p><h4>Core profile</h4><p>Delivers <strong>real-time, human-verified wildfire alerts</strong> via mobile app. Became <strong>#1 app in the Apple App Store</strong> during January 2025 LA wildfires. <strong>16.8 million yearly active users, 1.17 billion pageviews, 135,223 paying members</strong>. Served <strong>8 million people in a single week</strong> during the Palisades/Eaton fires, sustaining <strong>100,000 requests per second</strong>. Now in <strong>all 50 states</strong>, planning <strong>flood monitoring in 2026</strong>. Revenue: $349K (2022) to <strong>$11.4M (2025)</strong>. <strong>48 paid employees</strong>, 150+ volunteers.</p><p>Awards: <strong>Fast Company&rsquo;s #1 Most Innovative Nonprofit (2025)</strong>, <strong>TIME&rsquo;s 100 Most Innovative Companies</strong>, <strong>Apple&rsquo;s Design Award for Social Impact</strong>. Invited to the White House in 2024.</p><h4>AI-assisted verification</h4><p>Already using <strong>automated scanning bots</strong>. 2025 report confirms <strong>&ldquo;accelerating investments in automation and AI-assisted verification&rdquo;</strong> funded by <strong>Google.org</strong> ($2M) and <strong>McGovern Foundation</strong>. <strong>Ring/Amazon Fire Watch partnership</strong> (January 2026): <strong>computer vision AI</strong> on Ring cameras ($1M from Ring). Tech: Mapbox, Google Cloud/AWS/Heroku/Fastly, NASA VIIRS/MODIS satellites.</p><h4>Top Claude use cases</h4><p>(1) <strong>NLP-powered radio scanner monitoring and report generation</strong> &mdash; massively amplifying reporter capacity as they scale to 50 states. (2) <strong>Flood monitoring intelligence (greenfield)</strong> &mdash; processing NOAA data, NWS advisories, and social media for real-time flood intelligence. AI maturity: <strong>Active adoption</strong>. Frame Claude as a force multiplier for the human reporters who are Watch Duty&rsquo;s brand.</p>","WikiCharities / JoNI":"<h3>WikiCharities &amp; JoNI &mdash; Global nonprofit database with 10-million-org ambitions</h3><p><strong>Website:</strong> wikicharities.org | <strong>Type:</strong> 501(c)(3)</p><h4>Core profile</h4><p>Bills itself as &ldquo;world&rsquo;s largest open-access nonprofit database&rdquo; &mdash; <strong>2.1 million U.S. and Canadian nonprofits</strong> with plans for <strong>10 million globally in five years</strong>. Founded by <strong>Dr. Angie Holzer</strong>. Collects up to <strong>70 data points</strong> per organization. Runs on <strong>volunteer labor and student interns</strong>. FY2021 revenue: <strong>$60,000</strong>.</p><h4>Journal of Nonprofit Innovation (JoNI)</h4><p>Peer-reviewed, open-access academic journal with <strong>Brigham Young University</strong>. Downloaded in <strong>130+ countries</strong>, <strong>12% from government entities</strong>. Dedicated entire <strong>June 2024 issue to AI and nonprofits</strong>. Publishes in English, Spanish, German, and Hindi.</p><h4>Global nonprofit data accessibility study</h4><p>Examined <strong>nonprofit registry systems across all countries worldwide</strong>. Key finding: substantial regional disparities, particularly in Africa and Oceania.</p><h4>Top Claude use cases</h4><p>(1) <strong>Automated global data ingestion and harmonization</strong> &mdash; extracting from dozens of country registries in different formats, languages, and structures. (2) <strong>Multilingual research translation and content generation.</strong> AI maturity: <strong>Early exploration</strong> &mdash; AI-forward vision but extremely limited resources (~$60K budget, volunteer-run). Engagement would need to be through credits or pro-bono partnership.</p>","AI Spark Initiative (via Forward Global fiscal sponsor)":"<h3>Mark Zitter &mdash; Architect of a national AI adoption engine for nonprofits</h3><h4>Core profile</h4><p><strong>Serial healthcare entrepreneur turned social-sector AI evangelist.</strong> Sold two companies: <strong>Zitter Health Insights</strong> (~150 staff, sold to MMIT 2019) and <strong>Vital Decisions</strong> (sold to MTS Partners 2012) &mdash; both bootstrapped. <strong>MBA from Stanford GSB</strong>. Currently: Venture Partner at <strong>ICI Fund</strong> (Israeli AI VC), Venture Partner at <strong>StartFast Ventures</strong>, Advisory Committee at <strong>Riverside Partners</strong> (healthcare PE), Board Chair of Reel Medicine Media, Chair of Upstart Council on Innovation and Entrepreneurship. Angel investor and guest lecturer at Stanford GSB, Harvard School of Public Health, Yale Medical School, Wharton, and UC Berkeley Haas.</p><h4>The AI Spark initiative</h4><p>National initiative to rapidly accelerate generative AI adoption across the social sector. Model: <strong>90-minute live virtual session</strong> delivered by <strong>Purpose-Led AI (PLAI)</strong> (8,000+ nonprofits trained, 4.9/5 rating) followed by micro-learning and timed nudges. <strong>Free to participants</strong>; funders underwrite. Co-funders: <strong>Lenfest Institute for Journalism</strong>, <strong>Peter Brach</strong>. Fiscal sponsor: <strong>Forward Global</strong>. Pilot trained <strong>500+ professionals</strong> in February 2026. Goal: <strong>train thousands every week</strong> by spring 2026. He commissioned a <strong>field report on AI adoption barriers</strong> from Devi Thomas (Google).</p><h4>AI lens</h4><p>Addressing the <strong>&ldquo;efficiency plateau&rdquo;</strong>: <strong>92% of nonprofits have adopted AI, but only 7% report major strategic impact</strong>. <strong>81% use AI individually and ad hoc; only 4% have documented workflows</strong>. Top barrier: <strong>lack of training (48%)</strong>.</p><h4>Claude opportunity</h4><p>(1) <strong>Claude as the AI platform powering AI Spark at scale.</strong> Claude for Nonprofits could serve as both the learning tool AND the production tool participants adopt. (2) <strong>Claude as analytical engine for research and content creation.</strong> AI maturity: <strong>Strategist/Evangelist</strong>. He&rsquo;s building the human infrastructure for adoption &mdash; he needs an AI platform partner. This makes him an ideal <strong>distribution channel partner</strong> for Anthropic&rsquo;s nonprofit strategy.</p>","Held & Rooted":"<h3>Kalkidan (Kalie) Brown &mdash; Protective digital layer for mothers</h3><h4>Core profile</h4><p>Founder of <strong>Held &amp; Rooted</strong>, a very early-stage startup in private beta. Holds <strong>BSN</strong> and <strong>RN</strong> credentials alongside an <strong>MBA</strong>. Most recent employer: <strong>CHOC Children&rsquo;s</strong> (250,000+ children annually). Her name is Ethiopian in origin (meaning &ldquo;promise&rdquo; or &ldquo;covenant&rdquo; in Amharic).</p><h4>Mission and product vision</h4><p>Building <strong>&ldquo;the infrastructure layer for mothers in the AI era&rdquo;</strong> &mdash; <strong>intentional, ad-free, curated digital environments that protect and support women</strong>. Counter-positioning against the attention economy: no algorithmic feeds, no targeted advertising exploiting postpartum vulnerability, no data harvesting. Instead: expert-curated content, privacy-first architecture, design centered on maternal wellbeing.</p><h4>Market context</h4><p><strong>Femtech market:</strong> $8.56 billion (2025), projected $16.78 billion by 2030. Key gap: <strong>no dominant platform combines ad-free economics, privacy-first design, AI-era threat awareness, and clinical credibility</strong> for maternal populations.</p><h4>Claude opportunity</h4><p>(1) <strong>Claude as AI backbone for curated, evidence-based maternal content</strong> &mdash; a <strong>maternal health knowledge assistant</strong> synthesizing clinical research, AAP guidelines, and expert advice. Claude&rsquo;s constitutional AI (built-in safety, refusal to give dangerous medical advice) aligns perfectly. (2) <strong>Claude for community moderation and safe-space maintenance</strong> &mdash; <strong>trauma-informed content moderation</strong>. AI maturity: <strong>Early-stage visionary</strong>. This is a <strong>ground-floor partnership opportunity</strong>: help shape a platform&rsquo;s AI architecture from day one.</p>"};

// Fuzzy org-name lookup: tries exact match, then partial matches
function findResearch(orgName) {
  if (!orgName) return null;
  if (RESEARCH[orgName]) return RESEARCH[orgName];
  var orgLower = orgName.toLowerCase();
  var keys = Object.keys(RESEARCH);
  for (var i = 0; i < keys.length; i++) {
    var keyLower = keys[i].toLowerCase();
    if (orgLower.indexOf(keyLower) >= 0 || keyLower.indexOf(orgLower) >= 0) return RESEARCH[keys[i]];
  }
  var firstPart = orgName.split(/[\/\(]/)[0].trim();
  if (firstPart !== orgName) {
    if (RESEARCH[firstPart]) return RESEARCH[firstPart];
    for (var j = 0; j < keys.length; j++) {
      var keyFirst = keys[j].split(/[\/\(]/)[0].trim();
      if (keyFirst.toLowerCase() === firstPart.toLowerCase()) return RESEARCH[keys[j]];
    }
  }
  return null;
}

// Priority tier sort order and helpers

var TIER_KEY={'\u{1F534} Very High':'very-high','\u{1F7E0} High':'high','\u{1F7E1} Medium':'medium','\u{1F535} Lower':'lower'};
var TIER_CLASS={'\u{1F534} Very High':'vh','\u{1F7E0} High':'h','\u{1F7E1} Medium':'m','\u{1F535} Lower':'l'};
var TIER_LABEL={'\u{1F534} Very High':'Very High','\u{1F7E0} High':'High','\u{1F7E1} Medium':'Medium','\u{1F535} Lower':'Lower'};

var ENG_CLASS={
  'Direct Deployment':'direct',
  'Channel Partner':'channel',
  'Ecosystem Play':'ecosystem',
  'Relationship Building':'relationship'
};

// Sort data: priority tier first, then alphabetically
var sortedData=[].concat(DATA).sort(function(a,b){
  var ta=TIER_ORDER[a['Priority Tier']]!=null?TIER_ORDER[a['Priority Tier']]:9;
  var tb=TIER_ORDER[b['Priority Tier']]!=null?TIER_ORDER[b['Priority Tier']]:9;
  if(ta!==tb)return ta-tb;
  return a.Name.localeCompare(b.Name);
});

function escHtml(s){
  if(!s)return'';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildCard(item,idx){
  var tier=item['Priority Tier'];
  var tierCls=TIER_CLASS[tier]||'l';
  var tierLbl=TIER_LABEL[tier]||tier;
  var engType=item['Engagement Type']||'';
  var engCls=ENG_CLASS[engType]||'relationship';
  var focusAreas=(item['Focus Areas']||'').split(',').map(function(s){return s.trim()}).filter(Boolean);
  var li=item['LinkedIn']||'';
  var linkedinUrl=li?(li.indexOf('http')===0?li:'https://'+li):'';
  var notes=item['Notes']||'';
  var loc=item['Location']||'';
  var hasResearch=!!findResearch(item.Organization);

  var aiPattern=item['AI Pattern']||'';
  var brief=item['Brief']||'';
  var questions=item['Questions']||[];

  var detailsHtml='';

  // Brief (friend's note)
  if(brief){
    detailsHtml+='<div class="brief-box"><div class="brief-label">Quick Brief</div><div class="brief-text">'+escHtml(brief)+'</div></div>';
  }

  // Opener
  detailsHtml+='<div class="opener-box"><div class="opener-label">Conversation Opener</div><div class="opener-text">'+escHtml(item['Conversation Opener'])+'</div></div>';

  // Questions
  if(questions.length){
    detailsHtml+='<div class="questions-box"><div class="questions-label">Questions to Ask</div><ol class="questions-list">'+questions.map(function(q){return '<li>'+escHtml(q)+'</li>'}).join('')+'</ol></div>';
  }

  // AI Maturity
  if(item['AI Maturity']){
    detailsHtml+='<div class="detail-section"><div class="detail-label">AI Maturity</div><div class="detail-value">'+escHtml(item['AI Maturity'])+'</div></div>';
  }

  // Top Claude Use Case
  if(item['Top Claude Use Case']){
    detailsHtml+='<div class="detail-section"><div class="detail-label">Top Claude Use Case</div><div class="detail-value">'+escHtml(item['Top Claude Use Case'])+'</div></div>';
  }

  // Org Description
  if(item['Org Description']){
    detailsHtml+='<div class="detail-section"><div class="detail-label">Organization</div><div class="detail-value">'+escHtml(item['Org Description'])+'</div></div>';
  }

  // Inline row: Budget | Headcount | Location
  var inlineItems=[];
  if(item['Annual Budget'])inlineItems.push({label:'Budget',value:item['Annual Budget']});
  if(item['Headcount'])inlineItems.push({label:'Headcount',value:item['Headcount']});
  if(loc)inlineItems.push({label:'Location',value:loc});
  if(inlineItems.length){
    detailsHtml+='<div class="detail-inline">'+inlineItems.map(function(i){return '<div class="detail-inline-item"><div class="detail-label">'+escHtml(i.label)+'</div><div class="detail-value">'+escHtml(i.value)+'</div></div>'}).join('')+'</div>';
  }

  // Existing AI Tools
  if(item['Existing AI Tools']){
    detailsHtml+='<div class="detail-section"><div class="detail-label">Existing AI Tools</div><div class="detail-value">'+escHtml(item['Existing AI Tools'])+'</div></div>';
  }

  // Tech Partnerships
  if(item['Existing Tech Partnerships']){
    detailsHtml+='<div class="detail-section"><div class="detail-label">Tech Partnerships</div><div class="detail-value">'+escHtml(item['Existing Tech Partnerships'])+'</div></div>';
  }

  // Focus Areas tags
  if(focusAreas.length){
    detailsHtml+='<div class="detail-section"><div class="detail-label">Focus Areas</div><div class="tags">'+focusAreas.map(function(f){return '<span class="tag">'+escHtml(f)+'</span>'}).join('')+'</div></div>';
  }

  // LinkedIn
  if(linkedinUrl){
    detailsHtml+='<a href="'+escHtml(linkedinUrl)+'" target="_blank" rel="noopener" class="linkedin-btn" onclick="event.stopPropagation()"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>LinkedIn Profile</a>';
  }

  // Notes
  if(notes){
    detailsHtml+='<div class="notes-box"><strong>Notes:</strong> '+escHtml(notes)+'</div>';
  }

  return '<div class="card" data-idx="'+idx+'" data-tier="'+TIER_KEY[tier]+'" data-pattern="'+escHtml(aiPattern)+'" data-name="'+escHtml(item.Name.toLowerCase())+'" data-org="'+escHtml(item.Organization.toLowerCase())+'">' +

          '<span class="badge badge-eng-'+engCls+'">'+escHtml(engType)+'</span>' +

      '</div>' +

      '<div class="card-pattern-row">' +
        '<div class="card-title">'+escHtml(item['Title / Role'])+'</div>' +
      '</div>' +
      (aiPattern?'<span class="badge badge-pattern">'+escHtml(aiPattern)+'</span>':'') +
    '</div>' +
    '<div class="card-body"><div class="card-body-inner"><div class="card-divider"></div>'+detailsHtml+'</div></div>' +
  '</div>';
}

function render(){
  var query=currentSearch.toLowerCase().trim();
  var html='';
  var count=0;
  sortedData.forEach(function(item,idx){
    var tierKey=TIER_KEY[item['Priority Tier']];
    if(currentFilter!=='all'&&tierKey!==currentFilter)return;
    if(currentPattern!=='all'&&item['AI Pattern']!==currentPattern)return;
    if(query){
      var nameMatch=item.Name.toLowerCase().indexOf(query)>=0;
      var orgMatch=item.Organization.toLowerCase().indexOf(query)>=0;
      var patternMatch=(item['AI Pattern']||'').toLowerCase().indexOf(query)>=0;
      if(!nameMatch&&!orgMatch&&!patternMatch)return;
    }
    count++;
    html+=buildCard(item,idx);
  });
  cardList.innerHTML=html;
  counter.textContent=count+' of '+DATA.length+' contacts';
  emptyState.style.display=count===0?'block':'none';

  if(expandedIdx!==null){
    var el=cardList.querySelector('[data-idx="'+expandedIdx+'"]');
    if(el)el.classList.add('expanded');
    else expandedIdx=null;
  }
}

// Open research modal
function openResearchModal(orgName){
  var content=findResearch(orgName);
  modalTitle.textContent=orgName;
  if(content){
    modalBody.innerHTML=content;
  }else{
    modalBody.innerHTML='<div class="modal-no-research">No detailed research available for this organization.</div>';
  }
  modalBackdrop.classList.add('visible');
  requestAnimationFrame(function(){
    modalPanel.classList.add('visible');
  });
  document.body.style.overflow='hidden';
}

function closeResearchModal(){
  modalPanel.classList.remove('visible');
  setTimeout(function(){
    modalBackdrop.classList.remove('visible');
    document.body.style.overflow='';
  },350);
}

// Card tap handler - dual targets
cardList.addEventListener('click',function(e){
  // Check if org name was tapped (research modal)
  var orgEl=e.target.closest('[data-action="research"]');
  if(orgEl){
    e.stopPropagation();
    var orgKey=orgEl.getAttribute('data-org-key');
    openResearchModal(orgKey);
    return;
  }

  // Check if LinkedIn was clicked
  if(e.target.closest('.linkedin-btn'))return;

  // Otherwise, find the card and toggle expand
  var card=e.target.closest('.card');
  if(!card)return;
  var idx=parseInt(card.dataset.idx,10);

  if(expandedIdx===idx){
    card.classList.remove('expanded');
    expandedIdx=null;
    return;
  }
  var prev=cardList.querySelector('.card.expanded');
  if(prev)prev.classList.remove('expanded');
  card.classList.add('expanded');
  expandedIdx=idx;

  requestAnimationFrame(function(){
    var header=document.getElementById('header');
    var headerH=header.offsetHeight;
    var rect=card.getBoundingClientRect();
    if(rect.top<headerH){
      window.scrollBy({top:rect.top-headerH-8,behavior:'smooth'});
    }
  });
});

modalBackdrop.addEventListener('click',closeResearchModal);
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'&&modalPanel.classList.contains('visible')){
    closeResearchModal();
  }
});

// Search
searchInput.addEventListener('input',function(){
  currentSearch=this.value;
  clearBtn.classList.toggle('visible',currentSearch.length>0);
  expandedIdx=null;
  render();
});
clearBtn.addEventListener('click',function(){
  searchInput.value='';
  currentSearch='';
  clearBtn.classList.remove('visible');
  expandedIdx=null;
  render();
  searchInput.focus();
});

// Priority tier filter tabs
filterBtns.forEach(function(btn){
  btn.addEventListener('click',function(){
    filterBtns.forEach(function(b){b.classList.remove('active')});
    this.classList.add('active');
    currentFilter=this.dataset.filter;
    expandedIdx=null;
    render();
  });
});

// AI Pattern filter tabs
patternFilterBtns.forEach(function(btn){
  btn.addEventListener('click',function(){
    patternFilterBtns.forEach(function(b){b.classList.remove('active')});
    this.classList.add('active');
    currentPattern=this.dataset.pattern;
    expandedIdx=null;
    render();
  });
});

// Initial render
render();
</script>
</body>
</html>
